server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: restaurant-service
              uri: lb://restaurant-service
              predicates:
                - Path=/api/v1/restaurants/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/