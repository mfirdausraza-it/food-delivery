server:
  port: 8081

spring:
  application:
    name: order-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/order_db

#Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

#Log Pattern
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
